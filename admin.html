<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dPerfumes · Panel Admin</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<!-- ─── LOGIN ──────────────────────────────────────────────── -->
<section id="login-section">
  <div class="login-card">
    <h2>Acceso Administrador</h2>
    <form onsubmit="loginAdmin(event)">
      <div class="campo">
        <label for="login-email">Correo electrónico</label>
        <input type="email" id="login-email" required placeholder="admin@dperfumes.com" autocomplete="username">
      </div>
      <div class="campo">
        <label for="login-password">Contraseña</label>
        <input type="password" id="login-password" required placeholder="••••••••" autocomplete="current-password">
      </div>
      <p id="login-error"></p>
      <button type="submit" class="btn-login">Ingresar</button>
    </form>
  </div>
</section>

<!-- ─── PANEL ───────────────────────────────────────────────── -->
<div id="panel" class="hidden">

  <!-- Topbar -->
  <header class="topbar">
    <h1>dPerfumes · Panel Admin</h1>
    <div style="display:flex;align-items:center;gap:.75rem;">
      <a href="index.html" target="_blank"
         style="font-size:.75rem;color:rgba(255,255,255,.7);text-decoration:none;">
        Ver catálogo ↗
      </a>
      <button onclick="window.location.href='upload_imagenes.html'" style="background-color:#37b910;color:white;border:none;padding:.5rem 1rem;cursor:pointer;">Subir Imagenes</button>
      <button class="btn-logout" onclick="logoutAdmin()">Cerrar sesión</button>
    </div>
  </header>

  <!-- Contenido -->
  <main class="contenedor">

    <div class="card">
      <!-- Barra de acciones -->
      <div class="barra-acciones">
        <input type="search" id="search-admin" placeholder="Buscar por nombre o marca…">
        <span id="total-label" style="font-size:.78rem;color:#9ca3af;white-space:nowrap;"></span>
        <button class="btn-nuevo" onclick="abrirModalCrear()">+ Nuevo perfume</button>
      </div>

      <!-- Tabla -->
      <div class="tabla-wrap">
        <table>
          <thead>
            <tr>
              <th>Imagen</th>
              <th>Nombre</th>
              <th>Marca</th>
              <th>Familia</th>
              <th>Desde</th>
              <th>Stock</th>
              <th style="text-align:right">Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-perfumes">
            <tr><td colspan="7" class="text-center py-8" style="color:#9ca3af">Cargando…</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Paginación -->
      <div id="paginacion"></div>
    </div>

  </main>
</div>

<!-- ─── MODAL CREAR / EDITAR ────────────────────────────────── -->
<div id="modal" class="hidden">
  <div id="modal-overlay"></div>
  <div class="modal-box">
    <h2 id="modal-titulo">Nuevo Perfume</h2>

    <form id="perfume-form" onsubmit="guardarPerfume(event)" novalidate>
      <!-- Campo oculto con la ruta de imagen existente -->
      <input type="hidden" id="f-imagen-path">

      <!-- Nombre y Marca -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;">
        <div class="campo">
          <label for="f-name">Nombre *</label>
          <input type="text" id="f-name" required placeholder="Ej: 9 PM Elixir">
        </div>
        <div class="campo">
          <label for="f-brand">Marca *</label>
          <input type="text" id="f-brand" required placeholder="Ej: Afnan">
        </div>
      </div>

      <!-- Familia olfativa y stock -->
      <div style="display:grid;grid-template-columns:1fr auto;gap:.75rem;align-items:end;">
        <div class="campo">
          <label for="f-scent">Familia olfativa *</label>
          <select id="f-scent" required>
            <option value="">— Seleccionar —</option>
            <option>Fresco</option>
            <option>Frutal</option>
            <option>Dulce</option>
            <option>Especiado</option>
            <option>Amaderado</option>
            <option>Oriental</option>
            <option>Cítrico</option>
            <option>Floral</option>
          </select>
        </div>
        <div class="campo" style="display:flex;align-items:center;gap:.5rem;padding-bottom:.25rem;">
          <input type="checkbox" id="f-in-stock" checked style="width:16px;height:16px;">
          <label for="f-in-stock" style="font-size:.82rem;font-weight:500;cursor:pointer;">En stock</label>
        </div>
      </div>

      <!-- Notas -->
      <div class="campo">
        <label for="f-notas-salida">Notas de Salida</label>
        <textarea id="f-notas-salida" rows="2" placeholder="Ej: Limón, menta, bergamota…"></textarea>
      </div>
      <div class="campo">
        <label for="f-notas-corazon">Notas de Corazón</label>
        <textarea id="f-notas-corazon" rows="2" placeholder="Ej: Rosa, iris…"></textarea>
      </div>
      <div class="campo">
        <label for="f-notas-fondo">Notas de Fondo</label>
        <textarea id="f-notas-fondo" rows="2" placeholder="Ej: Vainilla, sándalo…"></textarea>
      </div>

      <!-- Presentaciones -->
      <div class="campo">
        <label>Presentaciones (tamaño + precio) *</label>
        <div id="presentaciones-list"></div>
        <button type="button" class="btn-agregar-pres" onclick="agregarPresentacion()">
          + Agregar presentación
        </button>
      </div>

      <!-- Imagen -->
      <div class="campo">
        <label>Imagen del producto</label>
        <div class="img-preview-wrap">
          <img id="img-preview" src="images/placeholder.webp" alt="Vista previa">
          <div style="flex:1;">
            <input type="file" id="f-imagen" accept="image/*" style="font-size:.78rem;">
            <p style="font-size:.72rem;color:#9ca3af;margin-top:.35rem;">
              Formatos: JPG, PNG, WEBP. Se sube al bucket <em>perfumes-images</em>.
            </p>
          </div>
        </div>
      </div>

      <!-- Botones -->
      <div class="modal-footer">
        <button type="button" class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
        <button type="submit" id="btn-guardar">Guardar</button>
      </div>
    </form>
  </div>
</div>

<!-- ─── MODAL CONFIRMAR ELIMINAR ───────────────────────────── -->
<div id="confirm-modal" class="hidden">
  <div class="confirm-box">
    <h3>¿Eliminar este perfume?</h3>
    <p>Esta acción es irreversible. También se borrará la imagen del bucket.</p>
    <input type="hidden" id="confirm-id">
    <input type="hidden" id="confirm-path">
    <div class="confirm-btns">
      <button class="btn-confirm-cancel"
              onclick="document.getElementById('confirm-modal').classList.add('hidden')">
        Cancelar
      </button>
      <button class="btn-confirm-ok" onclick="ejecutarEliminar()">Eliminar</button>
    </div>
  </div>
</div>

<!-- ─── TOAST ───────────────────────────────────────────────── -->
<div id="toast" class="toast"></div>

<!-- ─── SCRIPTS ─────────────────────────────────────────────── -->
<!-- Supabase JS v2 (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="JavaScript/admin.js"></script>

</body>
</html>
